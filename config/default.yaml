# =============================================================================
# Verbal Confidence — Default Configuration
# =============================================================================
#
# Two paths are REQUIRED in your .env file (copy .env.example):
#
#   EPHEMERAL_ROOT   Fast scratch for large, re-downloadable files.
#                    HF model weights, dataset cache, pip/conda installs.
#                    OK to wipe — everything can be re-fetched.
#                    HLR example: /scratch/mygroup/myuser
#
#   PERMANENT_ROOT   Durable storage for irreplaceable outputs.
#                    Experiment results, logs — back this up.
#                    HLR example: /home/myuser   or   /work/mygroup/myuser
#
# All ${VAR} placeholders resolve from:
#   1. config/default.yaml values (dot-notation: ${paths.hf_home})
#   2. Environment variables / .env  (e.g. ${EPHEMERAL_ROOT})
# =============================================================================


# ---------------------------------------------------------------------------
# Storage Paths
# ---------------------------------------------------------------------------
paths:
  # ── Ephemeral (re-downloadable) ─────────────────────────────────────────
  # Set EPHEMERAL_ROOT in .env. Fast scratch preferred (Lustre / NVMe).
  ephemeral_root: ${EPHEMERAL_ROOT}

  # HuggingFace model weights and dataset cache live here.
  hf_home:      ${paths.ephemeral_root}/hf_cache
  hf_datasets:  ${paths.ephemeral_root}/hf_cache/datasets
  model_cache:  ${paths.ephemeral_root}/hf_cache/hub

  # ── Permanent (important, back up) ──────────────────────────────────────
  # Set PERMANENT_ROOT in .env.
  permanent_root: ${PERMANENT_ROOT}

  # Experiment results: JSON outputs for every run.
  results_root: ${paths.permanent_root}/results/verbal-confidence

  # Structured logs per run.
  logs_root: ${paths.permanent_root}/logs/verbal-confidence

  # ── Run name ─────────────────────────────────────────────────────────────
  # Subdirectory created inside results_root for each run.
  # Overridden by --run-name CLI arg or RUN_NAME env var in SLURM scripts.
  run_name: default


# ---------------------------------------------------------------------------
# Models
# ---------------------------------------------------------------------------
models:
  # Primary model (paper: Gemma 3 27B)
  primary:
    name: google/gemma-3-27b-it
    dtype: bfloat16
    attn_implementation: eager   # safe for ROCm/MI210 (avoids flash-attn)
    max_length: 512
    load_in_8bit: false

  qwen:
    name: Qwen/Qwen2.5-7B-Instruct
    dtype: bfloat16
    attn_implementation: eager
    max_length: 512
    load_in_8bit: false

  magistral:
    name: mistralai/Magistral-Small-2506
    dtype: bfloat16
    attn_implementation: eager
    max_length: 512
    load_in_8bit: false

# Active model key (primary | qwen | magistral)
active_model: primary


# ---------------------------------------------------------------------------
# Datasets
# ---------------------------------------------------------------------------
datasets:
  trivia_qa:
    repo: mandarjoshi/trivia_qa
    config: rc.nocontext
    split: validation

  bigmath:
    repo: allenai/bigmath
    split: train

  mmlu:
    repo: cais/mmlu
    config: all
    split: test

active_dataset: trivia_qa

# Number of questions sampled per run
n_questions: 200

# Random seed for reproducible sampling
seed: 42


# ---------------------------------------------------------------------------
# Confidence Classes (paper Table 1)
# ---------------------------------------------------------------------------
confidence_classes:
  - "No chance"
  - "Really unlikely"
  - "Chances are slight"
  - "Unlikely"
  - "About even"
  - "Likely"
  - "Good chance"
  - "Very good chance"
  - "Highly likely"
  - "Almost certain"


# ---------------------------------------------------------------------------
# Phase 0 — Answer Generation
# ---------------------------------------------------------------------------
phase0:
  output_file: phase0.json
  max_new_tokens: 64
  temperature: 0.0
  do_sample: false

# ---------------------------------------------------------------------------
# Phase 1 — Confidence Elicitation
# ---------------------------------------------------------------------------
phase1:
  output_file: phase1.json
  # categorical | numerical | minimal
  prompt_variant: categorical

# ---------------------------------------------------------------------------
# Experiment 1 — Activation Steering
# ---------------------------------------------------------------------------
steering:
  output_file: steering.json
  layers: [10, 20, 30]
  positions: [panl, cc]
  alphas: [-2.0, -1.0, -0.5, 0.5, 1.0, 2.0]

# ---------------------------------------------------------------------------
# Experiment 2 — Activation Patching
# ---------------------------------------------------------------------------
patching:
  output_file: patching.json
  layers: [10, 20, 30]
  positions: [panl, cc, ac]

# ---------------------------------------------------------------------------
# Experiment 3 — Activation Noising (mean ablation)
# ---------------------------------------------------------------------------
noising:
  output_file: noising.json
  layers: [10, 20, 30]
  positions: [panl, cc, ac]
  n_mean_samples: 100

# ---------------------------------------------------------------------------
# Experiment 4 — Activation Swap
# ---------------------------------------------------------------------------
swap:
  output_file: swap.json
  layers: [10, 20, 30]
  positions: [panl, cc]
  pair_strategy: random
  n_pairs: 100

# ---------------------------------------------------------------------------
# Experiment 5 — Linear Probing
# ---------------------------------------------------------------------------
probing:
  output_file: probing.json
  layers: all            # "all" or list of ints
  positions: [panl, cc, ac]
  cv_folds: 5
  task: regression       # regression (R²) | classification (AUROC)

# ---------------------------------------------------------------------------
# Experiment 6 — Variance Partitioning
# ---------------------------------------------------------------------------
variance_partitioning:
  output_file: vp.json
  logprobs_file: logprobs.json
  positions: [panl, cc, ac]
  baselines: [question, answer, question_answer]

# ---------------------------------------------------------------------------
# Experiment 7 — Attention Blocking
# ---------------------------------------------------------------------------
attention_blocking:
  output_file: attention.json
  # cc_to_qa | cc_to_panl | panl_to_a
  block_patterns: [cc_to_qa, cc_to_panl, panl_to_a]
  layers: all

# ---------------------------------------------------------------------------
# Generalization
# ---------------------------------------------------------------------------
generalization:
  output_file: generalization.json
  prompt_variants: [categorical, numerical, minimal]
  extra_models: [qwen, magistral]
  extra_datasets: [bigmath, mmlu]


# ---------------------------------------------------------------------------
# SLURM / Compute (informational — values referenced in slurm/ scripts)
# ---------------------------------------------------------------------------
slurm:
  partition: gpu          # for jobs > 2 h
  test_partition: test    # for jobs < 2 h
  n_gpus: 2
  time: "24:00:00"
  mem: 0                  # 0 = use all available RAM on node
  mail_type: FAIL
  # mail_user: set in .env as SLURM_MAIL or override per job
