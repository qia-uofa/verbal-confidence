# =============================================================================
# Verbal Confidence — Default Configuration
# Goethe-HLR Frankfurt Cluster
# =============================================================================

# ---------------------------------------------------------------------------
# Storage Paths (HLR layout)
#   /home/<user>          — 30 GB, slow NFS  → source code only
#   /scratch/<group>/<user> — 5 TB, fast Lustre → all large data
#   /local/$SLURM_JOB_ID  — 1.4 TB NVMe, deleted after job → temp scratch
# ---------------------------------------------------------------------------
paths:
  # Root for all large outputs; override with $SCRATCH env var in SLURM scripts
  scratch_root: /scratch/${GROUP}/${USER}

  # HuggingFace cache — keeps model weights and datasets on fast scratch
  hf_home:      ${paths.scratch_root}/hf_cache
  hf_datasets:  ${paths.scratch_root}/hf_cache/datasets

  # Where model checkpoints are stored (inside hf_home by default)
  model_cache:  ${paths.scratch_root}/hf_cache/hub

  # Experiment outputs
  results_root: ${paths.scratch_root}/results/verbal-confidence
  logs_root:    ${paths.scratch_root}/logs/verbal-confidence

  # Per-run subdirectory created automatically: results_root/<run_name>/
  run_name: default


# ---------------------------------------------------------------------------
# Models
# ---------------------------------------------------------------------------
models:
  # Primary model (paper: Gemma 3 27B)
  primary:
    name: google/gemma-3-27b-it
    dtype: bfloat16
    # For ROCm/MI210 on HLR; set to "eager" to avoid flash-attn issues
    attn_implementation: eager
    # Max sequence length (tokens). Reduce if OOM.
    max_length: 512
    # Load in 8-bit for memory savings (requires bitsandbytes)
    load_in_8bit: false

  qwen:
    name: Qwen/Qwen2.5-7B-Instruct
    dtype: bfloat16
    attn_implementation: eager
    max_length: 512
    load_in_8bit: false

  magistral:
    name: mistralai/Magistral-Small-2506
    dtype: bfloat16
    attn_implementation: eager
    max_length: 512
    load_in_8bit: false

# Active model key (one of: primary, qwen, magistral)
active_model: primary


# ---------------------------------------------------------------------------
# Datasets
# ---------------------------------------------------------------------------
datasets:
  trivia_qa:
    repo: mandarjoshi/trivia_qa
    config: rc.nocontext
    split: validation

  bigmath:
    repo: allenai/bigmath
    split: train

  mmlu:
    repo: cais/mmlu
    config: all
    split: test

# Active dataset key
active_dataset: trivia_qa

# Number of questions sampled per dataset
n_questions: 200

# Random seed for sampling
seed: 42


# ---------------------------------------------------------------------------
# Confidence Classes
# The 10 verbal confidence expressions used in the paper.
# Class index 0 = least confident, 9 = most confident.
# ---------------------------------------------------------------------------
confidence_classes:
  - "No chance"
  - "Really unlikely"
  - "Chances are slight"
  - "Unlikely"
  - "About even"
  - "Likely"
  - "Good chance"
  - "Very good chance"
  - "Highly likely"
  - "Almost certain"


# ---------------------------------------------------------------------------
# Phase 0 — Answer Generation
# ---------------------------------------------------------------------------
phase0:
  output_file: phase0.json
  # Generation parameters
  max_new_tokens: 64
  temperature: 0.0      # greedy
  do_sample: false

# ---------------------------------------------------------------------------
# Phase 1 — Confidence Elicitation
# ---------------------------------------------------------------------------
phase1:
  output_file: phase1.json
  # Prompt variant: categorical | numerical | minimal
  prompt_variant: categorical

# ---------------------------------------------------------------------------
# Experiment 1 — Activation Steering
# ---------------------------------------------------------------------------
steering:
  output_file: steering.json
  # Layers to collect activations from and steer in
  layers: [10, 20, 30]
  # Token positions to steer: panl | panl_plus1 | cc | fcc | ac
  positions: [panl, cc]
  # Multipliers applied to the steering vector
  alphas: [-2.0, -1.0, -0.5, 0.5, 1.0, 2.0]

# ---------------------------------------------------------------------------
# Experiment 2 — Activation Patching
# ---------------------------------------------------------------------------
patching:
  output_file: patching.json
  layers: [10, 20, 30]
  positions: [panl, cc, ac]

# ---------------------------------------------------------------------------
# Experiment 3 — Activation Noising (mean ablation)
# ---------------------------------------------------------------------------
noising:
  output_file: noising.json
  layers: [10, 20, 30]
  positions: [panl, cc, ac]
  # Number of samples used to compute the mean activation
  n_mean_samples: 100

# ---------------------------------------------------------------------------
# Experiment 4 — Activation Swap
# ---------------------------------------------------------------------------
swap:
  output_file: swap.json
  layers: [10, 20, 30]
  positions: [panl, cc]
  # Swap across which question pairs: random | same_answer | diff_answer
  pair_strategy: random
  n_pairs: 100

# ---------------------------------------------------------------------------
# Experiment 5 — Linear Probing
# ---------------------------------------------------------------------------
probing:
  output_file: probing.json
  layers: all          # "all" or list of ints
  positions: [panl, cc, ac]
  # CV folds
  cv_folds: 5
  # Task: regression (R²) or classification (AUROC)
  task: regression

# ---------------------------------------------------------------------------
# Experiment 6 — Variance Partitioning
# ---------------------------------------------------------------------------
variance_partitioning:
  output_file: vp.json
  logprobs_file: logprobs.json
  positions: [panl, cc, ac]
  # Baselines: question | answer | question_answer | layer_repr | all
  baselines: [question, answer, question_answer]

# ---------------------------------------------------------------------------
# Experiment 7 — Attention Blocking
# ---------------------------------------------------------------------------
attention_blocking:
  output_file: attention.json
  # Which attention edges to block:
  #   cc_to_qa   : CC position cannot attend to Q+A tokens
  #   cc_to_panl : CC position cannot attend to PANL token
  #   panl_to_a  : PANL position cannot attend to answer tokens
  block_patterns: [cc_to_qa, cc_to_panl, panl_to_a]
  layers: all

# ---------------------------------------------------------------------------
# Generalization
# ---------------------------------------------------------------------------
generalization:
  output_file: generalization.json
  # Prompt variants to test: categorical | numerical | minimal
  prompt_variants: [categorical, numerical, minimal]
  # Extra models to test beyond active_model
  extra_models: [qwen, magistral]
  extra_datasets: [bigmath, mmlu]


# ---------------------------------------------------------------------------
# SLURM / Compute (informational — referenced in slurm/ scripts)
# ---------------------------------------------------------------------------
slurm:
  # Partition for long jobs (>2h)
  partition: gpu
  # Partition for short test jobs (<2h)
  test_partition: test
  # Number of GPUs per job
  n_gpus: 2
  # Wall-clock time limit
  time: "24:00:00"
  # Use all available memory on node
  mem: 0
  # Email notifications (set to your address)
  mail_user: ""
  mail_type: FAIL
